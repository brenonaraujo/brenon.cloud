name: Create blog post PR

on:
  push:
    branches:
      - blog-post

permissions:
  contents: read
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR for new blog post
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');

            const commits = context.payload.commits || [];
            const addedFiles = [...new Set(
              commits.flatMap((commit) => commit.added || [])
            )];

            if (addedFiles.length === 0) {
              core.info('No new files were added in this push.');
              return;
            }

            const reversedFiles = [...addedFiles].reverse();
            const preferredFile = reversedFiles.find((file) =>
              /^src\/content\/blog\/.+\.md$/i.test(file)
            );
            const selectedFile = preferredFile || reversedFiles[0];
            const filename = path.basename(selectedFile);
            const titleFromFilename = filename
              .replace(/(\.(en|pt))?\.md$/i, '')
              .replace(/\.[^.]+$/i, '');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:blog-post`;
            const base = 'main';
            const pullTitle = titleFromFilename || filename;
            const pullBody = [
              '## Summary',
              '',
              `Automatic PR created after adding \`${selectedFile}\` to \`blog-post\`.`,
              '',
              '## Source',
              '',
              '- Base: `main`',
              '- Head: `blog-post`',
            ].join('\n');

            const { data: existingPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
            });

            if (existingPulls.length > 0) {
              const pull = existingPulls[0];

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                title: pullTitle,
                body: pullBody,
                base,
              });

              core.info(`Updated PR #${pull.number} with title "${pullTitle}".`);
              return;
            }

            const { data: createdPull } = await github.rest.pulls.create({
              owner,
              repo,
              title: pullTitle,
              head: 'blog-post',
              base,
              body: pullBody,
            });

            core.info(`Created PR #${createdPull.number} with title "${pullTitle}".`);
