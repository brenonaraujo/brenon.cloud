# netlify.toml at repository root
[build]
  base    = "."         # because the Vue project is at the repo root
  publish = "dist"      # tell Netlify to deploy the Vite build output
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS    = "--legacy-peer-deps"

# /games/* holds the standalone game files (iframes). They must be served
# as static assets, not handed to the SPA. Everything else falls back to
# the Vue app so deep links like /games/tetris still resolve to the player.
[[redirects]]
  from = "/games/*"
  to   = "/games/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
